<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantBot AI — Day Trading Platform</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base: #080b10;
    --bg-panel: #0d1117;
    --bg-card: #111820;
    --bg-elevated: #161e28;
    --bg-hover: #1a2333;
    --border: rgba(255,255,255,0.06);
    --border-bright: rgba(255,255,255,0.12);
    --text-primary: #e8edf5;
    --text-secondary: #7d8fa3;
    --text-muted: #445566;
    --accent-green: #00d4a8;
    --accent-green-dim: rgba(0,212,168,0.12);
    --accent-green-glow: rgba(0,212,168,0.3);
    --accent-red: #ff4757;
    --accent-red-dim: rgba(255,71,87,0.12);
    --accent-blue: #4a90e2;
    --accent-blue-dim: rgba(74,144,226,0.12);
    --accent-amber: #f5a623;
    --accent-amber-dim: rgba(245,166,35,0.12);
    --accent-purple: #a855f7;
    --accent-purple-dim: rgba(168,85,247,0.12);
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui: 'Space Grotesk', sans-serif;
  }

  html, body { height: 100%; background: var(--bg-base); color: var(--text-primary); font-family: var(--font-ui); font-size: 14px; overflow: hidden; }

  #root { height: 100%; display: flex; flex-direction: column; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* Animations */
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
  @keyframes tick { 0% { color: var(--accent-green); } 100% { color: var(--text-primary); } }
  @keyframes countUp { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }

  .animate-in { animation: slideIn 0.3s ease forwards; }
  .pulse { animation: pulse 2s ease-in-out infinite; }
  .blink { animation: blink 1s step-end infinite; }

  /* Layout */
  .app-header {
    height: 52px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 24px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent-green);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--accent-green-dim);
    border: 1px solid var(--accent-green);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  .header-nav {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .nav-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .nav-btn.active { background: var(--accent-green-dim); color: var(--accent-green); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 8px var(--accent-green-glow);
  }

  .status-label {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-secondary);
  }

  .bot-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .bot-toggle.running {
    border-color: var(--accent-green);
    background: var(--accent-green-dim);
    color: var(--accent-green);
  }

  .bot-toggle.stopped {
    border-color: var(--text-muted);
    background: transparent;
    color: var(--text-secondary);
  }

  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section { padding: 16px 12px 8px; }
  .sidebar-label {
    font-size: 10px;
    font-family: var(--font-mono);
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 6px;
  }

  .pair-item {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    gap: 10px;
    transition: all 0.15s;
    margin-bottom: 2px;
  }

  .pair-item:hover { background: var(--bg-hover); }
  .pair-item.active { background: var(--accent-green-dim); }

  .pair-name {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    flex: 1;
    color: var(--text-primary);
  }

  .pair-price {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
  }

  .pair-change {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 3px;
  }

  .pos { background: var(--accent-green-dim); color: var(--accent-green); }
  .neg { background: var(--accent-red-dim); color: var(--accent-red); }
  .neu { background: rgba(255,255,255,0.05); color: var(--text-secondary); }

  /* Main content */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-base);
  }

  .content-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: auto 1fr;
    gap: 1px;
    flex: 1;
    overflow: hidden;
    background: var(--border);
  }

  /* Panels */
  .panel {
    background: var(--bg-base);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 12px;
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* Metric cards */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .metric-card {
    background: var(--bg-panel);
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .metric-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .metric-value {
    font-size: 18px;
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
  }

  .metric-sub {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
  }

  /* Chart area */
  .chart-area {
    flex: 1;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .chart-canvas-wrap {
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* AI Panel */
  .ai-panel { background: var(--bg-panel); }

  .ai-signal {
    margin: 12px;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid;
  }

  .ai-signal.buy { border-color: var(--accent-green); background: var(--accent-green-dim); }
  .ai-signal.sell { border-color: var(--accent-red); background: var(--accent-red-dim); }
  .ai-signal.neutral { border-color: var(--border-bright); background: var(--bg-elevated); }
  .ai-signal.strong-buy { border-color: var(--accent-green); background: rgba(0,212,168,0.18); box-shadow: 0 0 20px rgba(0,212,168,0.1); }

  .signal-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .signal-badge.buy { background: var(--accent-green); color: #000; }
  .signal-badge.sell { background: var(--accent-red); color: #fff; }
  .signal-badge.neutral { background: var(--bg-hover); color: var(--text-secondary); }
  .signal-badge.strong-buy { background: var(--accent-green); color: #000; }

  .signal-reasoning {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-secondary);
    font-family: var(--font-ui);
  }

  .signal-confidence {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .confidence-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .confidence-fill.high { background: var(--accent-green); }
  .confidence-fill.med { background: var(--accent-amber); }
  .confidence-fill.low { background: var(--accent-red); }

  /* Indicators grid */
  .indicators-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 12px;
  }

  .indicator-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ind-name {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ind-value {
    font-size: 16px;
    font-family: var(--font-mono);
    font-weight: 600;
  }

  .ind-signal {
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 2px 6px;
    border-radius: 3px;
    display: inline-flex;
    align-self: flex-start;
  }

  /* Positions table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-base);
    z-index: 1;
  }

  .data-table td {
    padding: 9px 12px;
    font-size: 12px;
    font-family: var(--font-mono);
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
    transition: background 0.1s;
  }

  .data-table tr:hover td { background: var(--bg-hover); }
  .data-table .pair-col { color: var(--text-primary); font-weight: 600; }

  /* Log */
  .log-entry {
    display: flex;
    gap: 8px;
    padding: 6px 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    line-height: 1.4;
  }

  .log-time { color: var(--text-muted); flex-shrink: 0; }
  .log-level { flex-shrink: 0; width: 50px; }
  .log-msg { color: var(--text-secondary); flex: 1; }
  .log-level.info { color: var(--accent-blue); }
  .log-level.success { color: var(--accent-green); }
  .log-level.warn { color: var(--accent-amber); }
  .log-level.error { color: var(--accent-red); }

  /* Tabs */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    gap: 2px;
  }

  .tab-btn {
    padding: 8px 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
  }

  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active { color: var(--accent-green); border-bottom-color: var(--accent-green); }

  /* Controls */
  .control-section { padding: 12px; border-bottom: 1px solid var(--border); }
  .control-title { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .control-label { font-size: 12px; color: var(--text-secondary); }

  .control-input {
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    padding: 4px 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-primary);
    width: 80px;
    text-align: right;
    outline: none;
    transition: border-color 0.15s;
  }

  .control-input:focus { border-color: var(--accent-green); }

  .mode-select {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    padding: 3px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .mode-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: none;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--text-muted);
  }

  .mode-btn.active {
    background: var(--accent-blue);
    color: #fff;
  }

  /* Price ticker */
  .price-ticker {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    overflow-x: auto;
    flex-shrink: 0;
  }

  .ticker-item {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .ticker-pair {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
  }

  .ticker-price {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .ticker-change {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
  }

  .divider { width: 1px; height: 16px; background: var(--border); }

  /* Risk gauge */
  .risk-gauge {
    margin: 12px;
    padding: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .gauge-bar {
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
    margin: 8px 0;
  }

  .gauge-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-amber), var(--accent-red));
  }

  /* Action buttons */
  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 6px;
    border: 1px solid;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    text-transform: uppercase;
  }

  .action-btn.buy-btn { border-color: var(--accent-green); background: var(--accent-green-dim); color: var(--accent-green); }
  .action-btn.buy-btn:hover { background: var(--accent-green); color: #000; }
  .action-btn.sell-btn { border-color: var(--accent-red); background: var(--accent-red-dim); color: var(--accent-red); }
  .action-btn.sell-btn:hover { background: var(--accent-red); color: #fff; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }

  /* Backtest */
  .backtest-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 12px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    text-align: center;
  }

  .stat-val { font-size: 20px; font-family: var(--font-mono); font-weight: 700; }
  .stat-lbl { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }

  /* Scanner */
  .scanner-row {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    cursor: pointer;
    transition: background 0.1s;
  }

  .scanner-row:hover { background: var(--bg-hover); }

  /* Right panel span */
  .panel-right { grid-row: 1 / 3; }

  /* Responsive overflow */
  .panel-body { overflow-y: auto; }

  /* Loading state */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }

  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Notification */
  .notif {
    position: fixed;
    top: 60px;
    right: 16px;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--font-mono);
    animation: slideIn 0.3s ease;
    z-index: 1000;
    max-width: 280px;
  }

  .notif.success { background: var(--accent-green); color: #000; }
  .notif.error { background: var(--accent-red); color: #fff; }
  .notif.info { background: var(--bg-elevated); border: 1px solid var(--border-bright); color: var(--text-primary); }

  /* Scrollable table container */
  .table-scroll { overflow: auto; flex: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── DATA ──────────────────────────────────────────────────────────────────

const PAIRS = [
  { symbol: 'BTCUSDT', name: 'BTC/USDT', price: 67842.30, change: 2.14, volume: '1.2B' },
  { symbol: 'ETHUSDT', name: 'ETH/USDT', price: 3421.55, change: -0.87, volume: '820M' },
  { symbol: 'BNBUSDT', name: 'BNB/USDT', price: 582.10, change: 1.23, volume: '210M' },
  { symbol: 'SOLUSDT', name: 'SOL/USDT', price: 182.44, change: 3.41, volume: '430M' },
  { symbol: 'ADAUSDT', name: 'ADA/USDT', price: 0.4821, change: -1.12, volume: '95M' },
  { symbol: 'XRPUSDT', name: 'XRP/USDT', price: 0.6234, change: 0.55, volume: '340M' },
  { symbol: 'DOGEUSDT', name: 'DOGE/USDT', price: 0.1742, change: 4.22, volume: '180M' },
  { symbol: 'AVAXUSDT', name: 'AVAX/USDT', price: 38.92, change: -2.10, volume: '75M' },
];

const generateCandles = (base, count = 80) => {
  const data = [];
  let price = base;
  const now = Date.now();
  for (let i = count; i >= 0; i--) {
    const open = price;
    const change = (Math.random() - 0.48) * base * 0.008;
    const close = price + change;
    const high = Math.max(open, close) + Math.random() * base * 0.003;
    const low = Math.min(open, close) - Math.random() * base * 0.003;
    data.push({ time: now - i * 60000, open, high, low, close, vol: Math.random() * 100 + 50 });
    price = close;
  }
  return data;
};

// ─── CHART COMPONENT ────────────────────────────────────────────────────────
function PriceChart({ pair }) {
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  const candles = useRef(generateCandles(pair.price));

  useEffect(() => {
    const ctx = chartRef.current.getContext('2d');
    if (chartInstance.current) chartInstance.current.destroy();

    const prices = candles.current.map(c => c.close);
    const labels = candles.current.map((c, i) => {
      if (i % 15 === 0) return new Date(c.time).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      return '';
    });

    // EMA calc
    const ema = (data, period) => {
      const k = 2 / (period + 1);
      const result = [data[0]];
      for (let i = 1; i < data.length; i++) result.push(data[i] * k + result[i - 1] * (1 - k));
      return result;
    };

    const ema9 = ema(prices, 9);
    const ema21 = ema(prices, 21);
    const vol = candles.current.map(c => c.vol);

    chartInstance.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Price',
            data: prices,
            borderColor: '#00d4a8',
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0.1,
            fill: {
              target: 'origin',
              above: 'rgba(0,212,168,0.04)',
            },
            order: 1,
          },
          {
            label: 'EMA 9',
            data: ema9,
            borderColor: '#f5a623',
            borderWidth: 1,
            pointRadius: 0,
            tension: 0.3,
            borderDash: [],
            order: 2,
          },
          {
            label: 'EMA 21',
            data: ema21,
            borderColor: '#a855f7',
            borderWidth: 1,
            pointRadius: 0,
            tension: 0.3,
            borderDash: [4, 3],
            order: 3,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 0 },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#161e28',
            borderColor: 'rgba(255,255,255,0.1)',
            borderWidth: 1,
            titleColor: '#7d8fa3',
            bodyColor: '#e8edf5',
            titleFont: { family: 'JetBrains Mono', size: 10 },
            bodyFont: { family: 'JetBrains Mono', size: 12 },
            callbacks: {
              title: ([item]) => labels[item.dataIndex] || '',
              label: (item) => {
                if (item.datasetIndex === 0) return ` Price: $${item.raw.toFixed(2)}`;
                if (item.datasetIndex === 1) return ` EMA9: $${item.raw.toFixed(2)}`;
                return ` EMA21: $${item.raw.toFixed(2)}`;
              },
            },
          },
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false },
            ticks: { color: '#445566', font: { family: 'JetBrains Mono', size: 9 }, maxRotation: 0 },
            border: { color: 'rgba(255,255,255,0.06)' },
          },
          y: {
            position: 'right',
            grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false },
            ticks: {
              color: '#445566',
              font: { family: 'JetBrains Mono', size: 9 },
              callback: (v) => {
                if (v >= 1000) return '$' + (v / 1000).toFixed(1) + 'k';
                return '$' + v.toFixed(3);
              },
            },
            border: { color: 'rgba(255,255,255,0.06)' },
          },
        },
        interaction: { intersect: false, mode: 'index' },
      },
    });

    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [pair.symbol]);

  // Simulate live price updates
  useEffect(() => {
    const interval = setInterval(() => {
      if (!chartInstance.current) return;
      const ds = chartInstance.current.data.datasets[0];
      const lastPrice = ds.data[ds.data.length - 1];
      const newPrice = lastPrice + (Math.random() - 0.485) * lastPrice * 0.0008;
      ds.data.shift();
      ds.data.push(newPrice);
      chartInstance.current.update('none');
    }, 1200);
    return () => clearInterval(interval);
  }, [pair.symbol]);

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative' }}>
      {/* Legend */}
      <div style={{ position: 'absolute', top: 0, left: 0, display: 'flex', gap: 12, zIndex: 2 }}>
        {[['#00d4a8', 'Price'], ['#f5a623', 'EMA 9'], ['#a855f7', 'EMA 21']].map(([color, label]) => (
          <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 18, height: 2, background: color, borderRadius: 1 }} />
            <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: '#7d8fa3' }}>{label}</span>
          </div>
        ))}
      </div>
      <canvas ref={chartRef} role="img" aria-label={`Gráfico de preço ${pair.name} com EMA 9 e EMA 21`}>Gráfico de preço em tempo real</canvas>
    </div>
  );
}

// ─── MINI CHART ──────────────────────────────────────────────────────────────
function MiniChart({ positive }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const w = 60, h = 24;
    const pts = Array.from({ length: 12 }, (_, i) => {
      const trend = positive ? i * 1.5 : -i * 1.5;
      return h / 2 - trend + (Math.random() - 0.5) * 6;
    });
    const xStep = w / (pts.length - 1);
    const min = Math.min(...pts), max = Math.max(...pts), range = max - min || 1;
    const norm = pts.map(p => h - ((p - min) / range) * h * 0.8 - h * 0.1);
    const d = norm.map((y, i) => `${i === 0 ? 'M' : 'L'} ${i * xStep} ${y}`).join(' ');
    ref.current.innerHTML = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <path d="${d}" fill="none" stroke="${positive ? '#00d4a8' : '#ff4757'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }, [positive]);
  return <div ref={ref} style={{ width: 60, height: 24 }} />;
}

                  <table className="data-table">

                      <tr>

  );
}

// ─── BACKTEST VIEW ────────────────────────────────────────────────────────────
function BacktestView() {
  const chartRef = useRef(null);

  useEffect(() => {
    const ctx = chartRef.current.getContext('2d');
    const equity = [10000];
    for (let i = 1; i < 90; i++) {
      const last = equity[equity.length - 1];
      equity.push(last * (1 + (Math.random() - 0.42) * 0.018));
    }
    const labels = equity.map((_, i) => i % 10 === 0 ? `Dia ${i + 1}` : '');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Curva de Capital',
          data: equity,
          borderColor: '#00d4a8',
          borderWidth: 2,
          pointRadius: 0,
          fill: { target: 'origin', above: 'rgba(0,212,168,0.05)' },
          tension: 0.3,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#445566', font: { family: 'JetBrains Mono', size: 9 } }, border: { color: 'rgba(255,255,255,0.06)' } },
          y: { position: 'right', grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#445566', font: { family: 'JetBrains Mono', size: 9 }, callback: v => '$' + v.toFixed(0) }, border: { color: 'rgba(255,255,255,0.06)' } },
        },
      },
    });
  }, []);

  return (
    <div style={{ flex: 1, overflow: 'auto', padding: 24 }}>
      <div style={{ maxWidth: 1000, margin: '0 auto' }}>
        <h2 style={{ fontFamily: 'var(--font-mono)', fontSize: 16, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 20 }}>Backtest — Estratégia EMA Cross + RSI</h2>

        <div className="backtest-stats">
          {[
            ['Win Rate', '68.4%', 'var(--accent-green)'],
            ['Total Trades', '312', 'var(--text-primary)'],
            ['Profit Factor', '2.14', 'var(--accent-green)'],
            ['Max Drawdown', '-8.3%', 'var(--accent-red)'],
            ['ROI (90 dias)', '+43.2%', 'var(--accent-green)'],
            ['Sharpe Ratio', '1.87', 'var(--accent-blue)'],
            ['Trades/dia', '3.47', 'var(--text-secondary)'],
            ['Avg Win', '+$32.10', 'var(--accent-green)'],
          ].map(([lbl, val, color]) => (
            <div className="stat-card" key={lbl}>
              <div className="stat-val" style={{ color }}>{val}</div>
              <div className="stat-lbl">{lbl}</div>
            </div>
          ))}
        </div>

        <div style={{ background: 'var(--bg-panel)', border: '1px solid var(--border)', borderRadius: 8, padding: 20, marginTop: 20 }}>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-muted)', marginBottom: 16, textTransform: 'uppercase', letterSpacing: 1 }}>Curva de Capital</div>

            <canvas ref={chartRef} role="img" aria-label="Curva de capital do backtest ao longo de 90 dias">Curva de capital crescente de $10.000 para ~$14.320</canvas>
          </div>
        </div>
      </div>
    </div>
  );
}

                    <td>

                      )}

                        <button style={{ padding: '3px 10px', borderRadius: 3, border: '1px solid var(--accent-red)', background: 'var(--accent-red-dim)', color: 'var(--accent-red)', fontFamily: 'var(--font-mono)', fontSize: 10, cursor: 'pointer' }}>
                          Short
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}

          </table>
        </div>

                  <td><span style={{ padding: '2px 8px', borderRadius: 3, background: 'var(--accent-blue-dim)', color: 'var(--accent-blue)', fontSize: 10, fontWeight: 700 }}>{u.plan}</span></td>
                  <td>{u.trades}</td>
                  <td style={{ color: u.pnl.startsWith('+') ? 'var(--accent-green)' : 'var(--accent-red)', fontWeight: 600 }}>{u.pnl}</td>
                  <td><span className={u.status === 'ATIVO' ? 'pos' : 'neg'} style={{ padding: '2px 8px', borderRadius: 3, fontSize: 10, fontWeight: 700 }}>{u.status}</span></td>
                  <td>
                    <button style={{ padding: '3px 8px', borderRadius: 3, border: '1px solid var(--border-bright)', background: 'transparent', color: 'var(--text-secondary)', fontFamily: 'var(--font-mono)', fontSize: 10, cursor: 'pointer' }}>
                      Ver
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
